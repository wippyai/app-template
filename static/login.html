<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wippy - Sign In</title>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.15/@wippy-fe/assets/theme-config.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.15/@wippy-fe/assets/preflight.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.15/@wippy-fe/assets/iframe.css">
    <link rel="stylesheet" href="https://web-host.wippy.ai/webcomponents-1.0.15/@wippy-fe/assets/tailwind.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        :root {
            --p-primary: #6366f1;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: color-mix(in srgb, var(--p-content-background) 92%, var(--p-text-color) 8%);
            color: var(--p-text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card .p-card-body {
            padding: 32px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            display: inline-block;
            width: 64px;
            height: 64px;
            margin-bottom: 14px;
        }

        .brand-icon img { width: 100%; height: 100%; }

        .brand h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--p-text-color);
            letter-spacing: -0.01em;
        }

        .brand p {
            font-size: 13px;
            color: var(--p-text-muted-color);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--p-text-muted-color);
            margin-bottom: 6px;
        }

        .form-group .p-inputtext {
            width: 100%;
        }

        .error-msg {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            background: color-mix(in srgb, var(--p-red-500) 10%, transparent);
            border: 1px solid color-mix(in srgb, var(--p-red-500) 30%, transparent);
            border-radius: 8px;
            color: var(--p-red-500);
            font-size: 13px;
        }

        .submit-btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-card p-card p-component">
        <div class="p-card-body">
            <div class="p-card-content">
                <div class="brand">
                    <div class="brand-icon">
                        <img src="/app/wippy-logo.svg" alt="Wippy">
                    </div>
                    <h1>Wippy App</h1>
                    <p>Sign in to continue</p>
                </div>
                <div id="error" class="error-msg" role="alert" aria-live="assertive"></div>
                <form id="login-form" aria-label="Sign in">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" required autocomplete="email" autofocus placeholder="you@example.com" class="p-inputtext p-component">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" type="password" required autocomplete="current-password" placeholder="Enter password" class="p-inputtext p-component">
                    </div>
                    <button type="submit" class="p-button p-component submit-btn" id="submit-btn">Sign In</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('login-form');
        const errorEl = document.getElementById('error');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/public/user/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (!res.ok || !data.success) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('@wippy_token_info', JSON.stringify({ token: data.token }));
                window.location.href = '/';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
