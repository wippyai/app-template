version: "1.0"
namespace: app.agents

entries:
  - name: wippy
    kind: registry.entry
    meta:
      type: agent.gen1
      title: Ask Wippy
      comment: Wippy AI assistant
      icon: tabler:message-circle
      class:
        - public
        - primary
    prompt: |
      You are Wippy, a helpful AI assistant.
      You can help users navigate the application and answer general questions.

      Available pages (use NavigateTo):
      - home: Home page
      - users: User management

      If the user asks to see or open a specific page, use NavigateTo.
      Be concise and helpful.
    model: claude-4-5-sonnet
    temperature: 0.5
    max_tokens: 8000
    traits:
      - id: userspace.user.traits:user_aware
      - id: app.agents:wippy_nav_trait
      - id: app.agents:wippy_artifacts_trait

  - name: wippy_nav_trait
    kind: registry.entry
    meta:
      type: agent.trait
      title: Wippy Navigation
      tags:
        - navigation
    prompt: |
      You have access to the NavigateTo tool to open pages in the UI.
      Use NavigateTo when the user wants to open or view a specific page.
    tools:
      - app.agents:navigate_to

  - name: wippy_artifacts_trait
    kind: registry.entry
    meta:
      type: agent.trait
      title: Wippy Artifacts
      tags:
        - artifacts
    prompt: |
      You have the CreateArtifact tool to create rich content artifacts displayed inline in the chat.

      Two modes:
      1. **Content mode** — pass `content` (HTML or Markdown) directly.
         Use for: formatted text, code snippets, tables, documentation.
      2. **Component mode** — pass `tag_name` and `props` to render a registered web component.
         Use for: diagrams, interactive widgets, visualizations.
         Only use tag names from the available components list in the session context.

      After calling the tool you will receive instructions with an artifact tag — include that tag in your response.
    tools:
      - app.agents:create_artifact

  - name: create_artifact
    kind: function.lua
    meta:
      type: tool
      title: Create Artifact
      input_schema: |
        {
          "type": "object",
          "properties": {
            "title": {
              "type": "string",
              "description": "Title for the artifact"
            },
            "content": {
              "type": "string",
              "description": "The content body. For content mode: HTML or Markdown string. For component mode: optional, usually use props instead."
            },
            "content_type": {
              "type": "string",
              "description": "MIME type for content mode",
              "enum": ["text/html", "text/markdown"],
              "default": "text/markdown"
            },
            "tag_name": {
              "type": "string",
              "description": "Web component tag name for component mode (e.g. 'example-mermaid'). When set, the artifact renders using this component instead of raw content."
            },
            "props": {
              "type": "object",
              "description": "Props object passed to the web component. Only used with tag_name."
            }
          },
          "required": ["title"],
          "additionalProperties": false
        }
      llm_alias: CreateArtifact
      llm_description: |
        Create a rich content artifact rendered inline in the chat.
        Two modes: (1) Content mode — provide title + content (HTML or Markdown).
        (2) Component mode — provide title + tag_name + props to render a registered web component.
        Use component mode when a matching component is available (check session context for available components).
    source: file://create_artifact.lua
    modules:
      - json
    imports: {}
    method: handler
    pool:
      size: 2

  - name: navigate_to
    kind: function.lua
    meta:
      type: tool
      title: Navigate To Page
      input_schema: |
        {
          "type": "object",
          "properties": {
            "page": {
              "type": "string",
              "description": "The page to navigate to",
              "enum": [
                "home",
                "users"
              ]
            }
          },
          "required": ["page"],
          "additionalProperties": false
        }
      llm_alias: NavigateTo
      llm_description: Open a page in the UI for the user.
    source: file://navigate_to.lua
    modules:
      - ctx
    imports: {}
    method: handler
    pool:
      size: 2
