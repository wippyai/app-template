version: "1.0"
namespace: app.env

entries:
  - name: file
    kind: env.storage.file
    auto_create: true
    file_path: .env
    lifecycle:
      auto_start: true

  - name: os
    kind: env.storage.os
    lifecycle:
      auto_start: true

  - name: router
    kind: env.storage.router
    lifecycle:
      auto_start: true
    storages:
      - app.env:file
      - app.env:os

  - name: public_env_handler
    kind: function.lua
    source: file://public_env_handler.lua
    modules:
      - http
      - env
    method: handler
    pool:
      size: 2

  - name: public_env_endpoint
    kind: http.endpoint
    meta:
      router: app:api.public
    method: GET
    func: public_env_handler
    path: /env/public.js
