version: "1.0"
namespace: app.api.websocket

entries:
  - name: ws_endpoint
    kind: function.lua
    source: file://ws_endpoint.lua
    modules:
      - http
      - security
      - json
      - logger
    method: handler

  - name: ws_endpoint.endpoint
    kind: http.endpoint
    meta:
      router: app:api
    method: GET
    func: ws_endpoint
    path: /ws/join
